<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <script>
      /* Pick the theme from local time before first paint: dark in the
         evening/night, light by day. Runs everywhere this file is copied with
         no setup. With JS off, the stylesheet's `color-scheme: light dark`
         follows the OS setting instead. */
      (function () {
        var hour = new Date().getHours();
        document.documentElement.dataset.theme =
          hour >= 19 || hour < 7 ? "dark" : "light";
      })();
    </script>
    <title>Interactive Brief</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrap">
      <main class="col" id="content" dir="auto">
