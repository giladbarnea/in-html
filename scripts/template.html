<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta
			name="annotation-endpoint"
			content="http://127.0.0.1:8765/annotations"
		>
		<title>Interactive Brief</title>
		<style>
		:root {
			--paper: #fffff8;
			--ink: #111;
			--faint: #6b6b6b;
			--rule: #d8d8cf;
			--accentbg: #fcf3d9;
			--accent: #9a6b00;
			--good: #1f6b3b;
			--goodbg: #e6f3ea;
			--bad: #9b2226;
			--badbg: #f7e7e6;
			--blue: #2a4d69;
			--bluebg: #e7eef4;
			--chip: #efe9d6;
		}
		* {
			box-sizing: border-box;
		}
		html {
			font-size: 17px;
		}
		body {
			margin: 0;
			background: var(--paper);
			color: var(--ink);
			font-family:
				Palatino, "Palatino Linotype", "Book Antiqua", Georgia, serif;
			line-height: 1.5;
			-webkit-font-smoothing: antialiased;
		}
		.wrap {
			max-width: 1080px;
			margin: 0 auto;
			padding: 4rem 1.5rem 6rem;
		}
		.col {
			max-width: 680px;
		}
		h1 {
			font-weight: 400;
			font-size: 2.5rem;
			line-height: 1.1;
			margin: 0 0 0.3rem;
		}
		.sub {
			font-style: italic;
			color: var(--faint);
			font-size: 1.15rem;
			margin: 0 0 2.5rem;
			max-width: 620px;
		}
		h2 {
			font-weight: 400;
			font-size: 1.7rem;
			margin: 3.5rem 0 0.2rem;
			line-height: 1.15;
		}
		h2 .n {
			font-style: italic;
			color: var(--accent);
			font-size: 1.1rem;
			display: block;
			margin-bottom: 0.15rem;
			letter-spacing: 0.03em;
		}
		h3 {
			font-weight: 600;
			font-size: 1.05rem;
			margin: 1.6rem 0 0.4rem;
			letter-spacing: 0.02em;
		}
		p {
			margin: 0.7rem 0;
			max-width: 680px;
		}
		.lead {
			font-size: 1.08rem;
		}
		em {
			font-style: italic;
		}
		strong {
			font-weight: 600;
		}
		hr {
			border: 0;
			border-top: 1px solid var(--rule);
			margin: 3rem 0;
		}
		code,
		.mono {
			font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
			font-size: 0.82em;
		}
		.sans {
			font-family:
				-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
				sans-serif;
		}
		button {
			font-family: inherit;
			cursor: pointer;
		}
		.muted {
			color: var(--faint);
		}

		aside.note {
			font-size: 0.9rem;
			color: var(--faint);
			border-left: 2px solid var(--rule);
			padding: 0.1rem 0 0.1rem 1rem;
			margin: 1.2rem 0;
			max-width: 640px;
			font-style: italic;
		}
		.card {
			border: 1px solid var(--rule);
			border-radius: 6px;
			background: #fffefb;
			padding: 1.1rem 1.2rem;
			margin: 1.2rem 0;
		}
		.callout {
			border-left: 3px solid var(--accent);
			background: var(--accentbg);
			padding: 0.8rem 1rem;
			border-radius: 0 6px 6px 0;
			margin: 1.2rem 0;
			font-size: 0.96rem;
		}
		.callout.bad {
			border-color: var(--bad);
			background: var(--badbg);
		}
		.callout.good {
			border-color: var(--good);
			background: var(--goodbg);
		}
		.stance {
			font-size: 1.12rem;
			line-height: 1.55;
			border-top: 1px solid var(--rule);
			border-bottom: 1px solid var(--rule);
			padding: 1.4rem 0;
			margin: 2.5rem 0 0;
		}

		.row {
			display: flex;
			flex-wrap: wrap;
			gap: 0.4rem;
			align-items: center;
			margin: 0.7rem 0;
		}
		.grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(14rem, 1fr));
			gap: 1rem;
			margin: 1rem 0;
		}
		.pane {
			border: 1px solid var(--rule);
			border-radius: 8px;
			padding: 0.9rem 1rem;
			background: #fffefb;
		}
		.pane h4 {
			margin: 0 0 0.5rem;
			font-size: 0.74rem;
			letter-spacing: 0.06em;
			text-transform: uppercase;
			color: var(--faint);
			font-weight: 600;
		}

		.btn {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			font-size: 0.88rem;
			padding: 0.45rem 0.9rem;
			border: 1px solid var(--rule);
			border-radius: 6px;
			background: #fbfaf3;
			color: var(--ink);
		}
		.btn:hover {
			background: var(--bluebg);
		}
		.btn:disabled {
			opacity: 0.45;
			cursor: default;
		}
		.chip {
			display: inline-block;
			padding: 0.15rem 0.55rem;
			border-radius: 999px;
			font-size: 0.82rem;
			background: var(--chip);
			border: 1px solid #e0d8bf;
			margin: 0.15rem 0.2rem;
			white-space: nowrap;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}
		.chip.field {
			background: var(--bluebg);
			border-color: #cdd9e4;
			color: var(--blue);
			font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
			font-size: 0.78rem;
		}
		.kbd {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			font-size: 0.7rem;
			color: var(--faint);
			border: 1px solid var(--rule);
			border-radius: 4px;
			padding: 0.05rem 0.35rem;
			background: #fbfaf3;
		}

		.disclose {
			margin: 1rem 0;
		}
		.disclose > .head {
			display: flex;
			align-items: center;
			gap: 0.6rem;
			cursor: pointer;
			user-select: none;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			font-size: 0.95rem;
			color: var(--blue);
			padding: 0.55rem 0.8rem;
			border: 1px solid var(--rule);
			border-radius: 6px;
			background: #fbfaf3;
		}
		.disclose > .head:hover {
			background: var(--bluebg);
		}
		.disclose > .head .tri {
			transition: transform 0.18s;
			font-size: 0.8rem;
		}
		.disclose.open > .head .tri {
			transform: rotate(90deg);
		}
		.disclose > .body {
			display: none;
			padding: 0.4rem 0.2rem 0.2rem;
		}
		.disclose.open > .body {
			display: block;
			animation: fade 0.25s ease;
		}
		@keyframes fade {
			from {
				opacity: 0;
				transform: translateY(-3px);
			}
			to {
				opacity: 1;
				transform: none;
			}
		}

		.pipe {
			display: flex;
			flex-wrap: wrap;
			gap: 0.5rem;
			align-items: stretch;
			margin: 1.2rem 0;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}
		.step {
			flex: 1 1 140px;
			border: 1px solid var(--rule);
			border-radius: 8px;
			padding: 0.7rem 0.8rem;
			background: #fffefb;
			cursor: pointer;
			position: relative;
			transition: 0.15s;
		}
		.step:hover {
			background: var(--bluebg);
		}
		.step.hot {
			border-color: var(--accent);
			background: var(--accentbg);
		}
		.step .k {
			font-size: 0.7rem;
			color: var(--faint);
			letter-spacing: 0.05em;
		}
		.step .t {
			font-weight: 600;
			font-size: 0.92rem;
			margin: 0.15rem 0;
		}
		.step .d {
			font-size: 0.8rem;
			color: var(--faint);
			display: none;
			margin-top: 0.4rem;
			line-height: 1.4;
		}
		.step.open .d {
			display: block;
		}
		.step .badge {
			position: absolute;
			top: -9px;
			right: 8px;
			font-size: 0.62rem;
			background: var(--accent);
			color: #fff;
			padding: 0.05rem 0.4rem;
			border-radius: 999px;
			letter-spacing: 0.04em;
		}

		.annotation-hover {
			outline: 2px solid var(--accent);
			outline-offset: 3px;
			cursor: crosshair;
		}
		.annotation-editor {
			position: fixed;
			z-index: 9999;
			width: clamp(18rem, 50vw, 42rem);
			max-width: 100vw;
			transform: translateX(-50%);
			border: 1px solid var(--rule);
			border-radius: 8px;
			background: #fffefb;
			box-shadow: 0 12px 36px rgba(0, 0, 0, 0.18);
			padding: 0.7rem;
		}
		.annotation-editor.inactive {
			opacity: 0.85;
		}
		.annotation-editor textarea {
			display: block;
			width: 100%;
			height: calc(3em + 1rem + 2px);
			padding: 0.5rem 0.65rem;
			border: 1px solid var(--rule);
			border-radius: 6px;
			background: #fff;
			color: var(--ink);
			font: inherit;
			line-height: 1.5;
			resize: none;
			overflow-y: auto;
			white-space: pre-wrap;
			overflow-wrap: break-word;
			outline: none;
		}
		.annotation-editor textarea:focus {
			border-color: var(--accent);
			box-shadow: 0 0 0 2px var(--accentbg);
		}
		.annotation-status {
			position: absolute;
			top: 0.35rem;
			right: 0.35rem;
			width: 1.55rem;
			height: 1.55rem;
			border-radius: 999px;
			display: none;
			place-items: center;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			font-size: 1rem;
			font-weight: 700;
			border: 1px solid currentColor;
			background: #fff;
		}
		.annotation-status.show {
			display: grid;
		}
		.annotation-status.ok {
			color: var(--good);
			background: var(--goodbg);
		}
		.annotation-status.fail {
			color: var(--bad);
			background: var(--badbg);
		}

		@media (max-width: 680px) {
			.grid {
				grid-template-columns: 1fr;
			}
		}
		</style>
	</head>
	<body>
		<div class="wrap">
			<main class="col" id="content">
				<!-- CONTENT START
Replace this comment block with the page body.
Recommended shape:

<h1>Title</h1>
<p class="sub">Subtitle or framing sentence.</p>
<p class="lead">Lead paragraph.</p>

<h2 data-annotation-id="stable-section-id"><span class="n">§1 · Claim label</span>Section claim</h2>
<p>Body text...</p>

Use data-annotation-id on important elements when you want stable JSON keys.
Use data-annotate-whole on a component when Shift+click should annotate the whole component rather than its leaf text.
CONTENT END -->
			</main>
		</div>

		<script>
		(() => {
			const endpointMeta = document.querySelector(
				'meta[name="annotation-endpoint"]',
			);
			const annotationEndpoint =
				endpointMeta?.content || "http://127.0.0.1:8765/annotations";
			const annotationIgnoredSelector = [
				".annotation-editor",
				"input",
				"textarea",
				"select",
				"[contenteditable]",
				"[data-annotation-ignore]",
			].join(",");
			const annotationWholeSelector = "[data-annotate-whole], .step, .bar";
			let highlightedAnnotationElement = null;
			let activeAnnotationEditor = null;
			let activeAnnotationElement = null;

			function elementHasOwnText(element) {
				return Array.from(element.childNodes).some(
					(node) => node.nodeType === Node.TEXT_NODE && node.textContent.trim(),
				);
			}

			function normalizedElementText(element) {
				return element.textContent.trim().replace(/\s+/g, " ");
			}

			function annotationCandidateFromPoint(clientX, clientY) {
				const element = document.elementFromPoint(clientX, clientY);
				if (!element || element.closest(annotationIgnoredSelector)) {
					return null;
				}

				const wholeElement = element.closest(annotationWholeSelector);
				if (wholeElement && normalizedElementText(wholeElement)) {
					return wholeElement;
				}

				if (element === document.documentElement || element === document.body) {
					return null;
				}
				if (
					element.classList.contains("wrap") ||
					element.classList.contains("col")
				) {
					return null;
				}
				if (!normalizedElementText(element)) {
					return null;
				}
				if (element.children.length && !elementHasOwnText(element)) {
					return null;
				}
				return element;
			}

			function setHighlightedAnnotationElement(element) {
				if (highlightedAnnotationElement === element) {
					return;
				}
				if (highlightedAnnotationElement) {
					highlightedAnnotationElement.classList.remove("annotation-hover");
				}
				highlightedAnnotationElement = element;
				if (highlightedAnnotationElement) {
					highlightedAnnotationElement.classList.add("annotation-hover");
				}
			}

			function selectorForAnnotationElement(element) {
				if (element.dataset.annotationId) {
					return `[data-annotation-id="${CSS.escape(element.dataset.annotationId)}"]`;
				}
				if (element.id) {
					return `#${CSS.escape(element.id)}`;
				}

				const parts = [];
				let current = element;
				while (current && current !== document.body) {
					if (current.dataset.annotationId) {
						parts.unshift(
							`[data-annotation-id="${CSS.escape(current.dataset.annotationId)}"]`,
						);
						break;
					}
					if (current.id) {
						parts.unshift(`#${CSS.escape(current.id)}`);
						break;
					}

					const tag = current.tagName.toLowerCase();
					const siblings = Array.from(current.parentElement.children).filter(
						(child) => child.tagName === current.tagName,
					);
					const nth =
						siblings.length > 1
							? `:nth-of-type(${siblings.indexOf(current) + 1})`
							: "";
					parts.unshift(`${tag}${nth}`);
					current = current.parentElement;
				}

				if (
					!parts[0]?.startsWith("#") &&
					!parts[0]?.startsWith("[data-annotation-id=")
				) {
					parts.unshift("body");
				}
				return parts.join(" > ");
			}

			function closeAnnotationEditor() {
				if (activeAnnotationEditor) {
					activeAnnotationEditor.remove();
				}
				activeAnnotationEditor = null;
				activeAnnotationElement = null;
				setHighlightedAnnotationElement(null);
			}

			function showAnnotationStatus(statusElement, className, text) {
				statusElement.className = `annotation-status show ${className}`;
				statusElement.textContent = text;
			}

			async function writeAnnotation(element, userInput) {
				const response = await fetch(annotationEndpoint, {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({
						selector: selectorForAnnotationElement(element),
						text: normalizedElementText(element),
						userInput,
					}),
				});

				if (response.ok) {
					return;
				}

				const details = await response.text();
				throw new Error(
					`Annotation write failed (${response.status}): ${details}`,
				);
			}

			function clamp(value, min, max) {
				if (max < min) {
					return min;
				}
				return Math.min(Math.max(value, min), max);
			}

			function positionAnnotationEditor(editor, element) {
				const elementRect = element.getBoundingClientRect();
				const editorRect = editor.getBoundingClientRect();
				const targetCenterX = elementRect.left + elementRect.width / 2;
				const targetTop = elementRect.top + elementRect.height / 2;
				const left = clamp(
					targetCenterX,
					editorRect.width / 2,
					window.innerWidth - editorRect.width / 2,
				);
				const top = clamp(targetTop, 0, window.innerHeight - editorRect.height);
				editor.style.left = `${left}px`;
				editor.style.top = `${top}px`;
			}

			function openAnnotationEditor(element) {
				closeAnnotationEditor();

				activeAnnotationElement = element;
				setHighlightedAnnotationElement(element);

				const editor = document.createElement("div");
				editor.className = "annotation-editor";
				editor.style.visibility = "hidden";
				editor.innerHTML =
					'<textarea aria-label="Annotation text" autofocus></textarea><div class="annotation-status"></div>';
				document.body.appendChild(editor);
				positionAnnotationEditor(editor, element);
				editor.style.visibility = "visible";

				const textarea = editor.querySelector("textarea");
				const status = editor.querySelector(".annotation-status");
				activeAnnotationEditor = editor;
				textarea.focus();

				textarea.addEventListener("keydown", async (event) => {
					if (
						event.key !== "Enter" ||
						event.shiftKey ||
						event.altKey ||
						event.ctrlKey ||
						event.metaKey
					) {
						return;
					}
					event.preventDefault();

					const userInput = textarea.value.trim();
					if (!userInput) {
						return;
					}

					try {
						await writeAnnotation(activeAnnotationElement, userInput);
						editor.classList.add("inactive");
						textarea.disabled = true;
						showAnnotationStatus(status, "ok", "✓");
						window.setTimeout(closeAnnotationEditor, 500);
					} catch (error) {
						console.error(error);
						showAnnotationStatus(status, "fail", "✕");
						textarea.focus();
					}
				});
			}

			document.querySelectorAll(".disclose .head").forEach((head) => {
				head.addEventListener("click", () =>
					head.parentElement.classList.toggle("open"),
				);
			});

			document.addEventListener("mousemove", (event) => {
				if (activeAnnotationEditor) {
					return;
				}
				setHighlightedAnnotationElement(
					annotationCandidateFromPoint(event.clientX, event.clientY),
				);
			});

			document.addEventListener(
				"click",
				(event) => {
					if (activeAnnotationEditor || !event.shiftKey) {
						return;
					}

					const element = annotationCandidateFromPoint(
						event.clientX,
						event.clientY,
					);
					if (!element) {
						return;
					}

					event.preventDefault();
					event.stopPropagation();
					openAnnotationEditor(element);
				},
				true,
			);

			document.addEventListener("keydown", (event) => {
				if (event.key === "Escape") {
					closeAnnotationEditor();
				}
			});

			window.addEventListener("resize", () => {
				if (activeAnnotationEditor && activeAnnotationElement) {
					positionAnnotationEditor(
						activeAnnotationEditor,
						activeAnnotationElement,
					);
				}
			});
		})();
		</script>
	</body>
</html>
